<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Every Fit | Official Site</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="common-header"></header>

    <div class="container">
       <section>
            <h2>Our Vision</h2>
            <p>全ての人が、無理なく、自分らしく、健康を管理できる世界を。</p>
            <p>私たちは「使いやすさ」と「寄り添い」を第一に、モバイルアプリケーションを開発しています。</p>
        </section>

        <section style="margin-top: 60px;">
            <h2>Applications</h2>
            <div class="app-card" style="display: flex; align-items: center; gap: 20px;">
                <img src="images/every_fit.png" alt="Every Fit Icon" style="width: 80px; height: 80px; border-radius: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">

                <div>
                    <h3>Every Fit</h3>
                    <p>シンプルで続けやすい体重管理アプリ。</p>
                    <div style="display: flex; align-items: center; gap: 15px; margin-top: 10px;">
                        <a href="https://apps.apple.com/us/app/every-fit/id6760971724" target="_blank">
                            <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/ja-jp?size=250x83" alt="App Storeからダウンロード" style="height: 35px;">
                        </a>
                        <a href="apps/every-fit/" style="color: var(--sub-text); text-decoration: none; font-size: 0.9em;">詳細を見る →</a>

                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer id="common-footer"></footer>

    <script>
        function loadHTML(id, url) {
            fetch(url)
                .then(response => response.text())
                .then(data => document.getElementById(id).innerHTML = data);
        }
        loadHTML('common-header', '/header.html');
        loadHTML('common-footer', '/footer.html');
    </script>
</body>
</html>
