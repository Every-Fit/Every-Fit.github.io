<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Every Fit - アプリ紹介</title>
    <link rel="stylesheet" href="../../css/style.css"> </head>
<body>
    <header id="common-header"></header>

    <div class="container" style="text-align: center;">
        <img src="../../images/every_fit.png" alt="Every Fit Icon" style="width: 120px; height: 120px; border-radius: 24px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
        <h2>About App</h2>
        <p>Every Fitは、日々の体重記録をストレスなく行えるよう設計された、Flutter製の体重管理アプリです。</p>
        <ul class="app-features">
            <li>直感的な操作感</li>
            <li>美しいグラフ表示</li>
            <li>余計な機能を削ぎ落としたシンプル設計</li>
        </ul>
        <div style="text-align: center; margin-top: 40px;">
            <a href="https://apps.apple.com/us/app/every-fit/id6760971724" target="_blank">
                <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/ja-jp?size=250x83" alt="App Storeからダウンロード" style="width: 200px;">
            </a>
        </div>
    </div>

    <footer id="common-footer"></footer>

    <script>
        function loadHTML(id, url) {
            fetch(url)
                .then(response => response.text())
                .then(data => document.getElementById(id).innerHTML = data);
        }
        loadHTML('common-header', '/header.html');
        loadHTML('common-footer', '/footer.html');
    </script>
</body>
</html>
