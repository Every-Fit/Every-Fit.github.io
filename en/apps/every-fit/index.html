<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Every Fit - App Details</title>
    <link rel="stylesheet" href="../../../css/style.css">
</head>
<body>
    <header id="common-header"></header>
    <div class="container" style="text-align: center;">
        <img src="../../../images/every_fit.png" alt="Every Fit Icon" style="width: 120px; height: 120px; border-radius: 24px; margin-bottom: 20px;">
        <h2>About App</h2>
        <p>Every Fit is a weight management app designed for stress-free daily tracking, built with Flutter.</p>
        <ul class="app-features" style="text-align: left; display: inline-block;">
            <li>Intuitive user experience</li>
            <li>Beautiful progress charts</li>
            <li>Minimalist design focusing on what matters</li>
        </ul>
        <div style="text-align: center; margin-top: 40px;">
                        <a href="https://apps.apple.com/us/app/every-fit/id6760971724" target="_blank">
                            <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-us?size=250x83" alt="Download on the App Store" style="height: 35px;">
                        </a>
        </div>
    </div>
    <footer id="common-footer"></footer>

    <script>
        //
        function loadHTML(id, url) {
            fetch(url)
                .then(response => response.text())
                .then(data => document.getElementById(id).innerHTML = data);
        }
        // 必ず先頭に / をつけてルートから読み込む
        loadHTML('common-header', '/header.html');
        loadHTML('common-footer', '/footer.html');
    </script>
</body>
</html>
